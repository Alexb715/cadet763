server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed Vite assets.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Never cache the entry document so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # SPA fallback: any unmatched path renders the React app.
    location / {
        try_files $uri /index.html;
    }

    # We do NOT proxy /api/* — that's the external reverse proxy's job.
    location /api/ {
        return 404;
    }
}
